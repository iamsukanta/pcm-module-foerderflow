services:
  # Local SMTP catcher for magic-link emails — web UI at http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-foerderflow}
      POSTGRES_USER: ${POSTGRES_USER:-foerderflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-foerderflow} -d ${POSTGRES_DB:-foerderflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./foerderflow-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-true}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-foerderflow}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-foerderflow}
      AUTH_SECRET: ${AUTH_SECRET:-dev-secret-change-me}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8000}
      EMAIL_SERVER_HOST: ${EMAIL_SERVER_HOST:-mailpit}
      EMAIL_SERVER_PORT: ${EMAIL_SERVER_PORT:-1025}
      EMAIL_SERVER_USER: ${EMAIL_SERVER_USER:-}
      EMAIL_SERVER_PASSWORD: ${EMAIL_SERVER_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-FörderFlow <noreply@foerderflow.local>}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      RUN_SEED: ${RUN_SEED:-0}
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started

  frontend:
    build:
      context: ./foerderflow-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://backend:8000/api}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
