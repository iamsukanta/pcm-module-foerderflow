services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-foerderflow} -d ${POSTGRES_DB:-foerderflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./foerderflow-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8002}:8000"
    env_file:
      - .env.production
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./foerderflow-frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* must be baked at build time (see frontend Dockerfile).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://217.160.247.163:8002/api}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://217.160.247.163:3003}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3003}:3000"
    env_file:
      - .env.production
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  backend_uploads:
